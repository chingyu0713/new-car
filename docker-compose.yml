services:
  db:
    image: postgres:16
    container_name: autospec-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-autospec_db}
    volumes:
      - autospec_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    container_name: autospec-backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-autospec_db}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-random-64-chars}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@autospec.dev}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:5001}
      DB_SSL: ${DB_SSL:-false}
    volumes:
      - autospec_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      args:
        VITE_API_BASE: /api
    container_name: autospec-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  # pgAdmin: only for development, remove in production
  pgadmin:
    image: dpage/pgadmin4
    container_name: autospec-pgadmin
    restart: unless-stopped
    profiles: ["dev"]
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@autospec.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    depends_on:
      - db

volumes:
  autospec_pgdata:
  autospec_uploads:
