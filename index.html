<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>新車誌 AutoMag</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300..900;1,14..32,300..900&display=swap" rel="stylesheet">
    <script>
      /* Prevent flash of wrong theme on load */
      (function() {
        var t = localStorage.getItem('automag_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
        document.documentElement.style.backgroundColor = t === 'light' ? '#F7F6F2' : '#0D0D0D';
      })();
    </script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Inter', 'PingFang TC', 'Noto Sans TC', sans-serif;
        -webkit-font-smoothing: antialiased;
        transition: background-color 0.25s, color 0.25s;
      }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track  { background: #1A1A1A; }
      ::-webkit-scrollbar-thumb  { background: #333; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #555; }
      /* select dropdown styling per theme */
      [data-theme="dark"] select option { background: #1A1A1A; color: #CCC; }
      [data-theme="light"] select option { background: #FFFFFF; color: #333; }
      [data-theme="dark"]  input { color-scheme: dark; }
      [data-theme="light"] input { color-scheme: light; }
    </style>

    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "recharts": "https://aistudiocdn.com/recharts@^3.5.1"
  }
}
</script>

</head>

</html>
